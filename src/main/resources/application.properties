spring.application.name=ventos

# ==========================================
# POSTGRESQL DATABASE CONNECTION PROPERTIES
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ventos
spring.datasource.username=admin
spring.datasource.password=bigH0rN25
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA & HIBERNATE CORE CONFIGURATIONS
# ==========================================
# Spring Boot automatically detects the Dialect, but you can declare it explicitly:
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Controls how Hibernate initializes the database schema automatically
# Choices: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update


# ==========================================
# DEBUGGING & LOGGING
# ==========================================
# Print SQL queries to the console log
spring.jpa.show-sql=true

# Format the printed SQL to make it easier to read
spring.jpa.properties.hibernate.format_sql=true